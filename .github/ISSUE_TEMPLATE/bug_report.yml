name: Bug report
description: Report broken behavior in Better Teams.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What broke, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps that reproduce the issue.
      placeholder: |
        1. Open Better Teams
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The Better Teams version, release tag, or commit SHA.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs after removing tokens, cookies, tenant IDs, user IDs, and private chat content.
      render: text
    validations:
      required: false
