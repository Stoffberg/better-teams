version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Tbilisi
    open-pull-requests-limit: 5
    groups:
      app-dependencies:
        dependency-type: production
      dev-tooling:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Asia/Tbilisi
    open-pull-requests-limit: 3
