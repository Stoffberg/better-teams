<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="100" x2="924" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C63FF"/>
      <stop offset="0.55" stop-color="#5046E5"/>
      <stop offset="1" stop-color="#3B2FBF"/>
    </linearGradient>
    <linearGradient id="top-shine" x1="512" y1="100" x2="512" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottom-shade" x1="512" y1="600" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="inner-edge" x1="512" y1="100" x2="512" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="back-clip">
      <rect x="100" y="100" width="824" height="824" rx="184"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="100" y="100" width="824" height="824" rx="184" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="412" rx="184" fill="url(#top-shine)"/>
  <rect x="100" y="512" width="824" height="412" rx="184" fill="url(#bottom-shade)"/>
  <rect x="102" y="102" width="820" height="820" rx="183" fill="none" stroke="url(#inner-edge)" stroke-width="1.5"/>

  <!-- All people clipped to icon bounds, shifted down 50px -->
  <g clip-path="url(#back-clip)" transform="translate(0, 50)">

    <!-- Small person (far right, faded) -->
    <g fill="white" fill-opacity="0.35">
      <circle cx="740" cy="340" r="38"/>
      <path d="M740 388C706 388 678 416 678 450V520C678 530 686 538 696 538H784C794 538 802 530 802 520V450C802 416 774 388 740 388Z"/>
    </g>

    <!-- Back person (left, semi-transparent) -->
    <g fill="white" fill-opacity="0.6">
      <circle cx="380" cy="340" r="64"/>
      <path d="M380 418C326 418 282 462 282 516V620C282 636 295 650 312 650H448C465 650 478 636 478 620V516C478 462 434 418 380 418Z"/>
    </g>

    <!-- Front person (center-right, solid white) -->
    <g fill="white">
      <circle cx="560" cy="310" r="80"/>
      <path d="M560 404C492 404 438 458 438 526V650C438 670 454 686 474 686H646C666 686 682 670 682 650V526C682 458 628 404 560 404Z"/>
    </g>

  </g>
</svg>
